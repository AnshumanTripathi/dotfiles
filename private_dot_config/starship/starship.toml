# ~/.config/starship/starship.toml
"$schema" = 'https://starship.rs/config-schema.json'

palette = "catppuccin_mocha"
add_newline = true
command_timeout = 500
scan_timeout = 30

format = """
$directory\
$git_branch$git_status\
$golang$python$nodejs\
$terraform$docker_context\
$fill\
$kubernetes\
$aws\
$gcloud\
$line_break\
$character"""

[character]
success_symbol = '[ÔØ»](bold green)'
error_symbol = '[ÔØ»](bold red)'

[directory]
style = "fg:crust bg:peach"
format = "[¯éÂ](fg:peach)[ $path ]($style)"
truncation_length = 5
truncate_to_repo = false

[git_branch]
symbol = "¯£Ñ"
style = "fg:crust bg:yellow"
format = '[¯é░](fg:peach bg:yellow)[ $symbol $branch]($style)'

[git_status]
style = "fg:crust bg:yellow"
format = '[$all_status$ahead_behind ]($style)[¯é░](fg:yellow bg:green)'

[golang]
symbol = "¯ÿº"
style = "fg:crust bg:green"
format = '[ $symbol $version ]($style)[¯é░](fg:green)'

[python]
symbol = "¯£╝"
style = "fg:crust bg:green"
format = '[ $symbol $version ]($style)[¯é░](fg:green)'

[nodejs]
symbol = "¾░ÄÖ"
style = "fg:crust bg:green"
format = '[ $symbol $version ]($style)[¯é░](fg:green)'

[terraform]
symbol = "¾▒üó"
style = "fg:crust bg:lavender"
format = '[ $symbol $version ]($style)[¯é░](fg:lavender)'

# [docker_context]
# symbol = "¯×░"
# style = "fg:crust bg:lavender"
# format = '[ $symbol $context ]($style)[¯é░](fg:lavender)'

[kubernetes]
disabled = false
symbol = "¾▒â¥"
style = "fg:crust bg:blue"
format = '[¯é▓](fg:blue)[ $symbol $context( \($namespace\)) ]($style)'

[aws]
symbol = "¯×¡"
style = "fg:crust bg:yellow"
format = '[](fg:yellow)[ $symbol $profile ]($style)'

[gcloud]
symbol = "¾▒çÂ"
style = "fg:crust bg:peach"
format = '[](fg:peach)[ $symbol $project ]($style)'

[fill]
symbol = " "

[line_break]
disabled = false

