packages:
  # ── macOS (Homebrew) ──
  brew:
    core:
      formulae:
        - asdf
    shared:
      formulae:
        # shell processing
        - bash # Updated shell
        - ripgrep
        - jq
        - yq
        - bat
        - eza
        # utilities
        - wget
        - gopass
        - fzf
        - fd
        - zsh-syntax-highlighting
        - starship
        - zoxide
        - pinentry-mac
        - rtk
      taps: []
      casks:
        - font-jetbrains-mono-nerd-font
        - ghostty
    container:
      formulae:
        - helm
        - kubectl
        - k9s
        - kubecm
        - kubie
        - krew
        - dive
        - kubeseal
        - operator-sdk
        - istioctl
      casks:
        - headlamp
    infra:
      formulae:
        - ansible
        - direnv
    security:
      taps:
        - snyk/tap
      formulae:
        - nmap
        - mtr
        - wireshark
        - snyk/tap/snyk
    python:
      formulae:
        - pyenv
        - pyenv-virtualenv
    backup:
      formulae:
        - restic
    profiles:
      personal:
        taps: []
        formulae:
          - gh
          - syncthing
          - tailscale
        casks: []
      work:
        taps:
          - redis/redis
        formulae:
          - maven
          - gemini-cli
        casks:
          - redis

  # ── Arch Linux (pacman + yay/AUR) ──
  pacman:
    core:
      packages:
        - base-devel
        - git
        - tlp
      aur: []
    shared:
      packages:
        # Shell processing
        - ripgrep
        - jq
        - yq
        - bat
        - eza
        - wget
        - gopass
        - fzf
        - fd
        - zsh-syntax-highlighting
        - starship
        - zoxide
        - ghostty
        # utilities
        - xclip
      aur:
        - asdf-vm
        - ttf-jetbrains-mono-nerd
        - rtk
        - zoom
    container:
      packages:
        - helm
        - kubectl
        - k9s
        - dive
        - kubeseal
      aur:
        - kubecm
        - kubie
        - headlamp-bin
        - krew-bin
        - operator-sdk-bin
    infra:
      packages:
        - ansible
        - direnv
      aur: []
    security:
      packages:
        - nmap
        - mtr
        - wireshark-qt
      aur:
        - snyk
    python:
      packages:
        - pyenv
        - tk
      aur:
        - pyenv-virtualenv
    backup:
      packages:
        - btrbk
        - restic
    profiles:
      personal:
        packages:
          - github-cli
          - keyd
          - ksnip
          - libreoffice-still
          - noto-fonts
          - noto-fonts-emoji
          - syncthing
          - tailscale
        aur: []
      work:
        packages: []
        aur: []

  # Future: just add a new key
  # apt:
  #   core: ...
  #   shared: ...
  #   profiles: ...

  # ── Cross-platform (always installed regardless of OS) ──
  common:
    core:
      asdf: []
    shared:
      wgets: []
      npm: []
      asdf:
        - name: nodejs
          plugin: https://github.com/asdf-vm/asdf-nodejs.git
    container:
      asdf:
        - name: kubectl
          plugin: https://github.com/asdf-community/asdf-kubectl.git
        - name: eksctl
          plugin: https://github.com/elementalvoid/asdf-eksctl.git
      wgets:
        darwin:
          - name: kubebuilder
            url: https://github.com/kubernetes-sigs/kubebuilder/releases/latest/download/kubebuilder_darwin_arm64
            tar: false
        linux:
          - name: kubebuilder
            url: https://github.com/kubernetes-sigs/kubebuilder/releases/latest/download/kubebuilder_linux_amd64
            tar: false
    infra:
      asdf:
        - name: terraform
          plugin: https://github.com/asdf-community/asdf-hashicorp.git
    profiles:
      personal:
        asdf:
          - name: gcloud
            plugin: https://github.com/jthegedus/asdf-gcloud
        wgets:
          darwin:
            - name: hugo
              url: https://github.com/gohugoio/hugo/releases/download/v0.133.0/hugo_extended_0.133.0_darwin-universal.tar.gz
              tar: true
            - name: labctl
              url: https://github.com/iximiuz/labctl/releases/download/v0.1.48/labctl_darwin_arm64.tar.gz
              tar: true
          linux:
            - name: hugo
              url: https://github.com/gohugoio/hugo/releases/download/v0.133.0/hugo_extended_0.133.0_linux-amd64.tar.gz
              tar: true
            - name: labctl
              url: https://github.com/iximiuz/labctl/releases/download/v0.1.48/labctl_linux_amd64.tar.gz
              tar: true
        npm: []
      work:
        asdf: []
        wgets:
          darwin: []
          linux: []
        npm: []
